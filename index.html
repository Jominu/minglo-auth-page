<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minglo 이메일 인증 완료</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6fbff;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #58b7e8;
      --primary-dark: #2f8fbd;
      --border: #dbeafe;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, #dff5ff 0, transparent 34%),
        linear-gradient(180deg, var(--bg), #ffffff);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(88, 183, 232, 0.18);
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      border-radius: 24px;
      background: linear-gradient(135deg, #8bdcff, #58b7e8);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 24px;
      letter-spacing: -0.04em;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 26px;
      line-height: 1.25;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .button {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 20px;
      border-radius: 999px;
      background: var(--primary);
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(88, 183, 232, 0.32);
    }

    .note {
      margin-top: 22px;
      font-size: 13px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">M</div>

    <h1>이메일 인증이 완료되었습니다</h1>

    <p>
      Minglo 계정 인증이 정상적으로 완료되었습니다.<br />
      앱으로 돌아가 로그인해주세요.
    </p>

    <a class="button" href="com.kmagentwork.minglo://auth-complete">
      Minglo 앱으로 돌아가기
    </a>

    <p class="note">
      버튼이 동작하지 않으면 Minglo 앱을 직접 열어주세요.
    </p>
  </main>
</body>
</html>
